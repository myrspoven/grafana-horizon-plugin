<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Horizon panel logo</title>
  <desc id="desc">A time series over an axis where older time intervals are compressed toward the horizon.</desc>
