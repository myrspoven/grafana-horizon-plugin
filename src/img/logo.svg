      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b0f18"/>
    </linearGradient>
    <linearGradient id="series" x1="26" x2="105" y1="82" y2="39" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5794f2"/>
      <stop offset="0.58" stop-color="#73bf69"/>
      <stop offset="1" stop-color="#ff9830"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="22" fill="#111217"/>
  <rect x="16" y="16" width="96" height="96" rx="16" fill="url(#panel)" stroke="#2a3446" stroke-width="2"/>

