name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build, for example main or v0.0.2. Leave empty to use the selected ref.'
        required: false
        type: string

permissions: read-all

jobs:
  release:
    permissions:
      attestations: write
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          sign_root_urls: https://grafana.myrspoven.se/
          node-version: '22'
          attestation: true
          use_changelog_generator: true
