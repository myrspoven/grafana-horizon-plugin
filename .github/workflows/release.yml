name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build, for example main or v0.0.2. Leave empty to use the selected ref.'
        required: false
        type: string

permissions: read-all

jobs:
  release:
    permissions:
      attestations: write
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Sign plugin
        run: npm run sign -- --rootUrls https://grafana.myrspoven.se/,http://grafana.myrspoven.se:3000/,https://testgrafana.myrspoven.se/,http://testgrafana.myrspoven.se:3000/
        env:
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}

      - name: Package plugin
        id: package
        shell: bash
        run: |
          plugin_id="$(node -p "require('./dist/plugin.json').id")"
          plugin_version="$(node -p "require('./dist/plugin.json').info.version")"
          archive="${plugin_id}-${plugin_version}.zip"
          mv dist "$plugin_id"
          zip -r "$archive" "$plugin_id"
          sha1sum "$archive" > "${archive}.sha1"
          echo "plugin_id=$plugin_id" >> "$GITHUB_OUTPUT"
          echo "plugin_version=$plugin_version" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Attest plugin package
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.package.outputs.archive }}

      - name: Check plugin metadata
        shell: bash
        run: |
          docker run --pull=always \
            -v "$PWD/${ARCHIVE}:/archive.zip" \
            grafana/plugin-validator-cli -analyzer=metadatavalid /archive.zip
        env:
          ARCHIVE: ${{ steps.package.outputs.archive }}

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="v${PLUGIN_VERSION}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        env:
          PLUGIN_VERSION: ${{ steps.package.outputs.plugin_version }}

      - name: Create or update draft release
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          archive="${{ steps.package.outputs.archive }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$archive" "${archive}.sha1" --clobber
          else
            gh release create "$tag" "$archive" "${archive}.sha1" \
              --draft \
              --target "${{ steps.release.outputs.source_sha }}" \
              --title "$tag" \
              --notes "Draft release for ${{ steps.package.outputs.plugin_id }} ${{ steps.package.outputs.plugin_version }}."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
